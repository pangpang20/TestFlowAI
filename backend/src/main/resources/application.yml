# TestFlowAI 后端应用配置
server:
  port: 18080
  address: 0.0.0.0
  servlet:
    context-path: /

spring:
  application:
    name: testflowai-backend
  profiles:
    active: dev
  # 强制使用 IPv4
  preference:
    ipv4-stack: true

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.testflowai.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: TestFlowAISecretKey2026VeryLongSecretKeyForJWT
  expiration: 86400000  # 24 小时

# 日志配置
logging:
  level:
    root: INFO
    com.testflowai: DEBUG
    org.springframework.security: DEBUG
